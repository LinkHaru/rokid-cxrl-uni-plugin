name: Build iOS uni native plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-15
    env:
      COCOAPODS_DISABLE_STATS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select requested Xcode
        shell: bash
        run: |
          if [ -n "${XCODE_APP:-}" ] && [ -d "/Applications/${XCODE_APP}" ]; then
            sudo xcode-select -s "/Applications/${XCODE_APP}"
          fi
          xcodebuild -version
          swift --version

      - name: Build plugin
        shell: bash
        run: bash scripts/build_ios_plugin.sh

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: Rokid-CXRL
          path: dist/Rokid-CXRL.zip

